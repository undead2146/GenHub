name: GenHub CI

permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  DOTNET_VERSION: '8.0.x'
  BUILD_CONFIGURATION: 'Release'
  CORE_PROJECT: 'GenHub/GenHub.Core/GenHub.Core.csproj'
  UI_PROJECT: 'GenHub/GenHub/GenHub.csproj'
  WINDOWS_PROJECT: 'GenHub/GenHub.Windows/GenHub.Windows.csproj'
  LINUX_PROJECT: 'GenHub/GenHub.Linux/GenHub.Linux.csproj'
  TEST_PROJECTS: 'GenHub/GenHub.Tests/**/*.csproj'

jobs:
  detect-changes:
    name: Detect File Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      core: ${{ steps.filter.outputs.core }}
      ui: ${{ steps.filter.outputs.ui }}
      windows: ${{ steps.filter.outputs.windows }}
      linux: ${{ steps.filter.outputs.linux }}
      tests: ${{ steps.filter.outputs.tests }}
      any: ${{ steps.filter.outputs.any }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Filter Changed Paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'GenHub/GenHub.Core/**'
            ui:
              - 'GenHub/GenHub/**'
            windows:
              - 'GenHub/GenHub.Windows/**'
            linux:
              - 'GenHub/GenHub.Linux/**'
            tests:
              - 'GenHub/GenHub.Tests/**'
            any:
              - '**/*.cs'
              - '**/*.axaml'
              - '**/*.csproj'
              - '**/*.sln'
              - '.github/workflows/**'

      - name: Changes Summary
        run: |
          echo "### 🔍 File Changes Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Core: ${{ steps.filter.outputs.core == 'true' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- UI: ${{ steps.filter.outputs.ui == 'true' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Windows: ${{ steps.filter.outputs.windows == 'true' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Linux: ${{ steps.filter.outputs.linux == 'true' && '✅' || '❌' }}" >> $GITHUB_STEP_SUMMARY

  build-windows:
    name: Build Windows
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.any == 'true' || needs.detect-changes.outputs.core == 'true' || needs.detect-changes.outputs.ui == 'true' || needs.detect-changes.outputs.windows == 'true' }}
    runs-on: windows-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          
      - name: Cache NuGet Packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      
      - name: Build Projects
        shell: pwsh
        run: |
          dotnet build "${{ env.CORE_PROJECT }}" -c ${{ env.BUILD_CONFIGURATION }}
          dotnet build "${{ env.UI_PROJECT }}" -c ${{ env.BUILD_CONFIGURATION }}
          dotnet build "${{ env.WINDOWS_PROJECT }}" -c ${{ env.BUILD_CONFIGURATION }}
      
      - name: Publish Windows App
        shell: pwsh
        run: |
          dotnet publish "${{ env.WINDOWS_PROJECT }}" -c ${{ env.BUILD_CONFIGURATION }} -r win-x64 --self-contained true -o "win-publish"
      
      - name: Run Tests
        shell: pwsh
        run: |
          $testProjects = Get-ChildItem -Path "GenHub/GenHub.Tests" -Recurse -Filter *.csproj | Where-Object { $_.Name -notlike '*Linux*' }
          if ($testProjects) {
            foreach ($testProject in $testProjects) {
              dotnet test $testProject.FullName -c ${{ env.BUILD_CONFIGURATION }}
              if ($LASTEXITCODE -ne 0) { exit 1 }
            }
          }
      
      - name: Run Application
        if: success()
        shell: pwsh
        run: |
          $exePath = "win-publish\GenHub.Windows.exe"
          if (Test-Path $exePath) {
            $stdoutFile = "stdout.log"
            $stderrFile = "stderr.log"
            
            # Launch detached, no wait
            Start-Process -FilePath $exePath -ArgumentList "--ci-test-mode" -WindowStyle Hidden -RedirectStandardOutput $stdoutFile -RedirectStandardError $stderrFile
            
            # Smoke test: Run 10s, then kill and check logs
            Start-Sleep 10
            taskkill /f /im GenHub.Windows.exe /t > $null 2>&1
            
            Start-Sleep 2  # Wait for kill
            
            $fullOutput = ""
            if (Test-Path $stdoutFile) {
              $stdout = Get-Content $stdoutFile -Raw
              $fullOutput += $stdout
              Write-Host "STDOUT: $stdout"
            }
            if (Test-Path $stderrFile) {
              $stderr = Get-Content $stderrFile -Raw
              $fullOutput += $stderr
              Write-Host "STDERR: $stderr"
            }
            
            # Pass if no error keywords (ignores hang, focuses on init errors)
            if ($fullOutput -match "Exception|Error|Failed|Unhandled|Aborted|crit") {
              Write-Error "Runtime error in short run output"
              exit 1
            }
            
            Write-Host "Success - no runtime errors in init"
          } else {
            Write-Error "Executable missing"
            exit 1
          }
      
      - name: Upload Windows Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: genhub-windows
          path: win-publish
          if-no-files-found: error
          
  build-linux:
    name: Build Linux
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.any == 'true' || needs.detect-changes.outputs.core == 'true' || needs.detect-changes.outputs.ui == 'true' || needs.detect-changes.outputs.linux == 'true' }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          
      - name: Cache NuGet Packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      
      - name: Build Projects
        run: |
          dotnet build "${{ env.CORE_PROJECT }}" -c ${{ env.BUILD_CONFIGURATION }}
          dotnet build "${{ env.UI_PROJECT }}" -c ${{ env.BUILD_CONFIGURATION }}
          dotnet build "${{ env.LINUX_PROJECT }}" -c ${{ env.BUILD_CONFIGURATION }}
      
      - name: Publish Linux App
        run: |
          dotnet publish "${{ env.LINUX_PROJECT }}" -c ${{ env.BUILD_CONFIGURATION }} -r linux-x64 --self-contained true -o "linux-publish"
      
      - name: Run Tests
        run: |
          shopt -s globstar nullglob
          test_count=0
          for test_project in GenHub/GenHub.Tests/**/*.csproj; do
            [[ "$test
